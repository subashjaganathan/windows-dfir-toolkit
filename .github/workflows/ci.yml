name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'HawkSuite/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'HawkSuite/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Run the full suite under Windows PowerShell 5.1 (the collector's target
      # runtime) for fidelity: parse-lint, analyzer build, collector modules,
      # raw parsers (synthetic), and the end-to-end self-test.
      - name: Run all tests
        shell: powershell
        run: .\HawkSuite\test\Run-AllTests.ps1
